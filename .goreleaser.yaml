# GoReleaser configuration for Terraform provider.
# Builds multi-platform provider binaries and publishes to Terraform Registry.

version: 2

project_name: terraform-provider-azureactions

before:
  hooks:
    - go mod download
    - go mod tidy

builds:
  - id: terraform-provider-azureactions
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    goos:
      - freebsd
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - "386"
      - arm
      - arm64
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: windows
        goarch: arm
    ldflags:
      - -s -w -X main.version={{.Version}}
    binary: "{{ .ProjectName }}_v{{ .Version }}"

archives:
  - formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256
  extra_files:
    - glob: terraform-registry-manifest.json
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"

signs:
  - artifacts: checksum
    args:
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"
    output: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS.sig"

release:
  github:
    owner: WebedMJ
    name: terraform-provider-azureactions
  extra_files:
    - glob: terraform-registry-manifest.json
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"

changelog:
  use: github
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))?!?:.+$'
      order: 100
    - title: Bug fixes
      regexp: '^.*?bug(\(.+\))?!?:.+$'
      order: 200
    - title: Documentation
      regexp: '^.*?docs?(\(.+\))?!?:.+$'
      order: 300
    - title: Others
      order: 999
